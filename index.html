<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiklikDrama - Cultural Entertainment</title>
    <meta http-equiv="refresh" content="0; url=deploy-ready/index.html">
    <style>
        body {
            background: #000;
            color: #FFD700;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            max-width: 600px;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 15px;
            padding: 40px;
            backdrop-filter: blur(10px);
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        .btn {
            display: inline-block;
            padding: 15px 30px;
            background: #FFD700;
            color: #000;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background: #FF8C00;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 140, 0, 0.3);
        }
        .loading {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>LiklikDrama</h1>
        <p class="loading">Redirecting to main website...</p>
        <p>If you're not redirected automatically, <a href="deploy-ready/index.html" class="btn">Click Here</a></p>
        <p style="font-size: 1rem; opacity: 0.7; margin-top: 30px;">
            Professional Cultural Entertainment & Marketing Services
        </p>
    </div>
</body>
</html>
